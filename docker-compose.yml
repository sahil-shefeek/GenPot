services:
  genpot:
    build: .
    ports:
      - "8000:8000"
      - "8501:8501"
    volumes:
      - ./logs:/app/logs
    env_file:
      - .env
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"
