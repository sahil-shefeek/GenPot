filebeat.inputs:
- type: filestream
  id: genpot-logs
  paths:
    - /usr/share/filebeat/logs/honeypot.jsonl
  parsers:
    - ndjson:
        target: ""
        overwrite_keys: true
        add_error_key: true

output.elasticsearch:
  hosts: ["elasticsearch:9200"]

setup.kibana:
  host: "kibana:5601"
