filebeat.inputs:
  - type: filestream
    id: genpot-logs
    paths:
      - /usr/share/filebeat/logs/honeypot.jsonl
    parsers:
      - ndjson:
          target: ""
          overwrite_keys: true
          add_error_key: true

output.elasticsearch:
  hosts: ["http://elasticsearch:9200"] # <-- ADDED http://

setup.kibana:
  host: "http://kibana:5601" # <-- ADDED http://
